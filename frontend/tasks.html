<!DOCTYPE html>
<html>
<head>
  <title>Schedule Task</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-dark bg-dark">
  <div class="container-fluid">
    <span class="navbar-brand">Schedule Maintenance Task</span>
    <a href="index.html" class="text-white">Dashboard</a>
  </div>
</nav>

<div class="container mt-4">

  <form id="taskForm">
    <select id="machineSelect" class="form-control mb-2"></select>
    <input type="text" id="taskName" class="form-control mb-2" placeholder="Task Name" required>
    <input type="date" id="scheduledDate" class="form-control mb-2" required>
    <button class="btn btn-primary">Add Task</button>
  </form>

  <h4 class="mt-4">All Tasks</h4>
  <table class="table table-bordered">
    <thead>
      <tr>
        <th>Machine</th>
        <th>Task</th>
        <th>Date</th>
        <th>Status</th>
        <th>Update</th>
      </tr>
    </thead>
    <tbody id="taskTable"></tbody>
  </table>

</div>

<script>

function loadMachines() {
  fetch("http://localhost:4000/api/machines")
  .then(res => res.json())
  .then(data => {
    let options = "";
    data.forEach(m => {
      options += `<option value="${m._id}">${m.name}</option>`;
    });
    document.getElementById("machineSelect").innerHTML = options;
  });
}

function loadTasks() {
  fetch("http://localhost:4000/api/tasks")
  .then(res => res.json())
  .then(data => {
    let rows = "";
    data.forEach(t => {
      rows += `
        <tr>
          <td>${t.machineId ? t.machineId.name : "Machine Deleted"}</td>
          <td>${t.taskName}</td>
          <td>${new Date(t.scheduledDate).toLocaleDateString()}</td>
          <td>${t.status}</td>
          <td>
            ${
              t.status === "pending"
              ? `<button class="btn btn-success btn-sm"
                    onclick="completeTask('${t._id}', '${t.machineId ? t.machineId._id : ""}')">
                    Complete
                 </button>`
              : `<span class="text-success fw-bold">Completed</span>`
            }
          </td>
        </tr>
      `;
    });
    document.getElementById("taskTable").innerHTML = rows;
  });
}

function completeTask(taskId, machineId) {
  fetch("http://localhost:4000/api/tasks/" + taskId, {
    method: "PUT",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ status: "completed" })
  })
  .then(() => {
    if (machineId) {
      fetch("http://localhost:4000/api/machines/updateDue/" + machineId, {
        method: "PUT"
      }).then(() => loadTasks());
    } else {
      loadTasks();
    }
  });
}

document.getElementById("taskForm").addEventListener("submit", function(e) {
  e.preventDefault();

  fetch("http://localhost:4000/api/tasks", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      machineId: document.getElementById("machineSelect").value,
      taskName: document.getElementById("taskName").value,
      scheduledDate: document.getElementById("scheduledDate").value
    })
  }).then(() => loadTasks());
});

loadMachines();
loadTasks();

</script>

</body>
</html>
