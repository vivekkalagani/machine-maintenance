<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark">
  <div class="container-fluid">
    <span class="navbar-brand">Machine Maintenance Dashboard</span>
    <div>
      <a href="machines.html" class="text-white me-3">Machines</a>
      <a href="tasks.html" class="text-white me-3">Schedule Task</a>
      <a href="due.html" class="text-white">Due Machines</a>
    </div>
  </div>
</nav>

<div class="container mt-4">
  <div class="row text-center">
    <div class="col-md-4">
      <div class="card bg-primary text-white p-3">
        <h5>Total Machines</h5>
        <h3 id="totalMachines">0</h3>
      </div>
    </div>
    <div class="col-md-4">
      <div class="card bg-danger text-white p-3">
        <h5>Overdue Machines</h5>
        <h3 id="overdueMachines">0</h3>
      </div>
    </div>
    <div class="col-md-4">
      <div class="card bg-warning text-dark p-3">
        <h5>Pending Tasks</h5>
        <h3 id="pendingTasks">0</h3>
      </div>
    </div>
  </div>
</div>

<script>
fetch("http://localhost:4000/api/machines")
.then(res => res.json())
.then(data => {
  totalMachines.innerText = data.length;
  overdueMachines.innerText =
    data.filter(m => m.status === "Overdue").length;
});

fetch("http://localhost:4000/api/tasks")
.then(res => res.json())
.then(data => {
  pendingTasks.innerText =
    data.filter(t => t.status === "pending").length;
});
</script>

</body>
</html>
